name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or limitation you are running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you have tried or other approaches that could work.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Metadata Forge
        - M4B Tool
        - Folder Forge
        - Library Downloader
        - Accounts / auth
        - Start Here
        - Docker / install
        - Other
    validations:
      required: true
