name: Build upstream image

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          repository: coconautilus17/LibraForge

      - name: Check for new commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse HEAD)
          echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "short_sha=${UPSTREAM_SHA::7}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already built
        id: exists
        run: |
          if docker manifest inspect "ghcr.io/adarack/libraforge:sha-${{ steps.check.outputs.short_sha }}" > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.exists.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/adarack/libraforge:latest
            ghcr.io/adarack/libraforge:sha-${{ steps.check.outputs.short_sha }}
            ghcr.io/adarack/libraforge:${{ steps.check.outputs.date }}
